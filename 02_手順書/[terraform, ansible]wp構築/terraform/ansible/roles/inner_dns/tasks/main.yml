---
- name: Install bind/named packages
  ansible.builtin.dnf:
    name:
      - bind
      - bind-utils
    state: present

- name: Ensure named enabled and started
  ansible.builtin.systemd:
    name: named
    enabled: true
    state: started

- name: Compute zone serial (YYYYMMDD01)
  ansible.builtin.set_fact:
    zone_serial: "{{ (ansible_date_time.date | regex_replace('-', '')) ~ '01' }}"

- name: Create zone file with backup
  ansible.builtin.template:
    src: zone.j2
    dest: "/var/named/{{ domain_name_inner }}.zone"
    owner: root
    group: named
    mode: "0644"
    backup: true
  notify: restart named

# named.conf 修正（40_inner_dns_setup.sh の listen-on コメントアウト/allow-query any/zone 追加を冪等化）
- name: Backup named.conf explicitly (extra safety)
  ansible.builtin.copy:
    src: /etc/named.conf
    dest: "/etc/named.conf.ansible_{{ ansible_date_time.iso8601_basic_short }}.bak"
    remote_src: true
    mode: "0644"
  changed_when: false

